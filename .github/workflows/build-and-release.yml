name: 发布版本

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例: 0.0.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: 打包并发布
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: "386"
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: 构建前端
        run: |
          yarn --cwd frontend install --frozen-lockfile
          yarn --cwd frontend build

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - name: 构建二进制文件
        run: |
          VERSION=${{ github.event.inputs.version }}
          LDFLAGS="-X main.Version=${VERSION} -X main.BuildTime=$(date +%s) -s -w"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "${LDFLAGS}" -o yonghemolimis${{ matrix.ext }}

      - name: 创建压缩包
        run: |
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf yonghemolimis-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.event.inputs.version }}.tar.gz yonghemolimis${{ matrix.ext }}
          else
            zip yonghemolimis-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.event.inputs.version }}.zip yonghemolimis${{ matrix.ext }}
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: yonghemolimis-${{ matrix.goos }}-${{ matrix.goarch }}
          path: yonghemolimis-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.event.inputs.version }}.${{ matrix.archive }}

  release:
    name: 创建发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: artifacts/**/yonghemolimis-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}