name: 预览

on:
  workflow_dispatch:
  push:
    branches:
      - dev-*

permissions:
  contents: write

jobs:
  build:
    name: 在线预览
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 创建 SSH 配置
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile=/dev/null" >> ~/.ssh/config

      - name: 测试 SSH 连接
        run: |
          USER=${{ secrets.SSH_SERVER_USER }}
          MYIP=${{ secrets.SSH_SERVER_IP }}
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no $USER@$MYIP "echo 'SSH connection successful!' || echo 'Connection failed'"

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: 构建前端
        run: |
          yarn --cwd frontend install --ignore-engines
          yarn --cwd frontend build

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 构建 Docker 镜像
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || git rev-parse --short HEAD 2>/dev/null || echo "0.0.1")
          echo "Using VERSION=$VERSION"
          docker build --build-arg VERSION=$VERSION -t yonghemolimis:latest -t yonghemolimis:$VERSION .

      - name: 保存 Docker 镜像
        run: |
          docker save yonghemolimis:latest | gzip > yonghemolimis.tar.gz

      - name: 推送镜像和配置文件到服务器并部署
        run: |
          USER=${{ secrets.SSH_SERVER_USER }}
          MYIP=${{ secrets.SSH_SERVER_IP }}
          
          # 上传镜像文件和配置文件
          scp yonghemolimis.tar.gz $USER@$MYIP:/home/lighthouse/
          scp .github/docker-compose.yml $USER@$MYIP:/home/lighthouse/
          scp .github/nginx.conf $USER@$MYIP:/home/lighthouse/
          
          # 在 CentOS 9 服务器上执行部署
          ssh $USER@$MYIP "
            # 检查并安装 Docker 和 Docker Compose (如果未安装)
            if ! command -v docker &> /dev/null; then
              echo 'Installing Docker on CentOS 9...'
              sudo dnf remove -y docker docker-client docker-client-latest docker-common docker-latest docker-latest-logrotate docker-logrotate docker-engine podman runc
              sudo dnf install -y dnf-utils
              sudo dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
              sudo dnf install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker \$USER
              echo 'Docker installation completed'
            fi
            
            # 检查并安装 Docker Compose
            if ! command -v docker-compose &> /dev/null; then
              echo 'Installing Docker Compose...'
              sudo curl -L \"https://github.com/docker/compose/releases/latest/download/docker-compose-\$(uname -s)-\$(uname -m)\" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi
            
            # 启动 Docker 服务
            sudo systemctl start docker
            
            # 停止并删除旧的容器和服务
            cd /home/lighthouse
            docker-compose down || echo '没有运行的服务'
            docker stop yonghemolimis nginx || echo '容器不存在'
            docker rm yonghemolimis nginx || echo '容器不存在'
            
            # 删除旧镜像
            docker rmi yonghemolimis:latest || echo 'yonghemolimis镜像不存在'
            
            # 加载新镜像
            docker load < /home/lighthouse/yonghemolimis.tar.gz
            
            # 检查防火墙并开放端口
            if command -v firewall-cmd &> /dev/null; then
              sudo firewall-cmd --permanent --add-port=80/tcp || echo '端口80已开放'
              sudo firewall-cmd --permanent --add-port=443/tcp || echo '端口443已开放'
              sudo firewall-cmd --permanent --add-port=17187/tcp || echo '端口17187已开放'
              sudo firewall-cmd --reload || echo '防火墙重载失败'
            fi
            
            # 使用 Docker Compose 启动服务
            docker-compose up -d
            
            # 清理镜像文件
            rm /home/lighthouse/yonghemolimis.tar.gz
            
            # 显示容器状态
            echo '=== 所有容器状态 ==='
            docker ps -a
          "

      - name: 验证部署
        run: |
          USER=${{ secrets.SSH_SERVER_USER }}
          MYIP=${{ secrets.SSH_SERVER_IP }}
          ssh $USER@$MYIP "
            echo '等待服务启动...'
            sleep 10

            echo '=== 检查yonghemolimis容器日志 ==='
            docker logs yonghemolimis --tail 20
            
            echo '=== 检查nginx容器日志 ==='
            docker logs nginx --tail 20
            
            echo '=== 检查端口监听状态 ==='
            ss -tlnp | grep -E ':(80|443|17187)'

            echo '=== Docker网络信息 ==='
            docker network ls
            docker inspect bridge | grep -A 20 'Containers'

            echo '=== 服务健康检查完成 ==='
          "