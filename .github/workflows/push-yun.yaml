name: 推送镜像

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例: 0.0.1)'
        required: false
        default: 'latest'
      login:
        description: '登录地址 (例: ccr.ccs.tencentyun.com)'
        required: false
        default: 'docker.io'
      name:
        description: '镜像仓库 (例: ccr.ccs.tencentyun.com)'
        required: false
        default: 'docker.io'
      username:
        description: '仓库用户名'
        required: false
        default: 'ningmengchongshui'
      password:
        description: '仓库密码'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: 推送
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Yarn
        run: npm install -g yarn

      - name: 构建前端
        run: |
          yarn --cwd frontend install --ignore-engines
          yarn --cwd frontend build

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker 登录
        if: ${{ github.event.inputs.username != '' && github.event.inputs.password != '' }}
        run: |
          REGISTRY="${{ github.event.inputs.login || 'docker.io' }}"
          echo "${{ github.event.inputs.password }}" | docker login "$REGISTRY" --username "${{ github.event.inputs.username }}" --password-stdin

      - name: 构建并推送 Docker 镜像
        run: |
          docker buildx rm gobuilder || true
          docker buildx create --name gobuilder --config ./buildkitd.toml --use --driver-opt network=host
          docker buildx inspect --bootstrap
          
          # 版本优先使用输入；若为 latest 或未提供，则回退到最近 tag，否则使用短 SHA
          INPUT_VER="${{ github.event.inputs.version }}"
          if [ -z "$INPUT_VER" ] || [ "$INPUT_VER" = "latest" ]; then
            TAG_VER=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [ -n "$TAG_VER" ]; then
              VERSION="$TAG_VER"
            else
              VERSION=$(git rev-parse --short HEAD)
            fi
          else
            VERSION="$INPUT_VER"
          fi

          REGISTRY="${{ github.event.inputs.name || 'docker.io' }}"
          
          # 设置完整的镜像名称
          if [ "$REGISTRY" = "docker.io" ]; then
            IMAGE_BASE="ningmengchongshui/yonghemolimis"
          else
            IMAGE_BASE="${REGISTRY}/ningmengchongshui/yonghemolimis"
          fi
          IMAGE_LATEST="$IMAGE_BASE:latest"
          IMAGE_VERSION="$IMAGE_BASE:${VERSION}"
          echo "构建镜像: $IMAGE_VERSION 和 $IMAGE_LATEST (双标签)"

          # 构建并推送镜像
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION="$VERSION" \
            -t "$IMAGE_VERSION" \
            -t "$IMAGE_LATEST" \
            --push .