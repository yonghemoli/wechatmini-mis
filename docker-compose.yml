services:
  yonghemolimis:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        GO_IMAGE: ${GO_IMAGE:-golang:1.24-alpine}
        ALPINE_IMAGE: ${ALPINE_IMAGE:-alpine:3.20}
    image: yonghemolimis:latest
    container_name: yonghemolimis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      # ---- 应用配置 ----
      - MIS_SERVER_HOST=${MIS_SERVER_HOST:-127.0.0.1}
      - MIS_SERVER_PORT=${MIS_SERVER_PORT:-8080}
      - MIS_MODE=${MIS_MODE:-release}
      # ---- 业务数据库 (MySQL, 读写) ----
      - MIS_DB_DRIVER=mysql
      - MIS_DB_DSN=${MIS_DB_DSN:-root:password@tcp(127.0.0.1:3306)/yonghemolimis?charset=utf8mb4&parseTime=True&loc=Local}
      - MIS_DB_AUTO_MIGRATE=${MIS_DB_AUTO_MIGRATE:-false}
      # MinIO 配置
      - MIS_OSS_ENDPOINT=oss-files.alemonjs.com
      - MIS_OSS_ACCESS_KEY=lemonade
      - MIS_OSS_SECRET_KEY=lemonade
      - MIS_OSS_USE_SSL=true
      - MIS_OSS_BUCKET=oss-ui
      - MIS_OSS_PUBLIC_BASE_URL=https://yonghemoli.com/images-proxy
    ports:
      - "15980:8080"
    volumes:
      - ./work:/app/work
    networks:
      - yonghemolimis-network

networks:
  yonghemolimis-network:
    driver: bridge

volumes:
  mysqldata:
