services:
  mysql:
    image: mysql:8.4
    container_name: yonghemolimis-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-yonhemoli_mis}
      - TZ=Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - yonghemolimis-network

  yonghemolimis:
    build:
      context: .
      args:
        ALPINE_MIRROR: ${ALPINE_MIRROR:-mirrors.aliyun.com}
        GITHUB_REWRITE_BASE: ${GITHUB_REWRITE_BASE:-github.com}
      secrets:
        - github_token
    image: yonghemolimis:latest
    container_name: yonghemolimis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - TZ=Asia/Shanghai
      # ---- 应用配置 ----
      - MIS_SERVER_HOST=${MIS_SERVER_HOST:-127.0.0.1}
      - MIS_SERVER_PORT=${MIS_SERVER_PORT:-8080}
      - MIS_MODE=${MIS_MODE:-release}
      # ---- 业务数据库 (MySQL, 读写) ----
      - MIS_DB_DRIVER=mysql
      - MIS_DB_DSN=${MIS_DB_DSN:-root:password@tcp(mysql:3306)/yonhemoli_mis?charset=utf8mb4&parseTime=True&loc=Local}
      - MIS_DB_AUTO_MIGRATE=${MIS_DB_AUTO_MIGRATE:-false}
    ports:
      - "4001:8080"
    volumes:
      - ./work:/app/work
    networks:
      - yonghemolimis-network
    depends_on:
      - mysql

secrets:
  github_token:
    environment: GITHUB_TOKEN

networks:
  yonghemolimis-network:
    driver: bridge

volumes:
  mysqldata:
