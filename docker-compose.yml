services:
  mysql:
    image: mysql:8.4
    container_name: yonghemolimis-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-yonhemoli_mis}
      - TZ=Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - yonghemolimis-network

  yonghemolimis:
    build:
      context: .
      args:
        ALPINE_MIRROR: ${ALPINE_MIRROR:-mirrors.aliyun.com}
        GITHUB_REWRITE_BASE: ${GITHUB_REWRITE_BASE:-github.com}
      secrets:
        - github_token
    image: yonghemolimis:latest
    container_name: yonghemolimis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - TZ=Asia/Shanghai
      # ---- 应用配置 ----
      - ANALYTICS_SERVER_HOST=${ANALYTICS_SERVER_HOST:-127.0.0.1}
      - ANALYTICS_SERVER_PORT=${ANALYTICS_SERVER_PORT:-8080}
      - ANALYTICS_MODE=${ANALYTICS_MODE:-release}
      - MIS_ADMIN_USERNAME=${MIS_ADMIN_USERNAME:-admin}
      - MIS_ADMIN_PASSWORD=${MIS_ADMIN_PASSWORD:-admin123}
      - MIS_ADMIN_EMAIL=${MIS_ADMIN_EMAIL:-admin@yonghemoli.local}
      # ---- 业务数据库 (MySQL, 读写) ----
      - ANALYTICS_DB_DRIVER=mysql
      - ANALYTICS_DB_DSN=${ANALYTICS_DB_DSN:-root:password@tcp(mysql:3306)/yonhemoli_mis?charset=utf8mb4&parseTime=True&loc=Local}
      - ANALYTICS_DB_AUTO_MIGRATE=true
      - ANALYTICS_TRACK_API_KEY=77211084835e915e2c937cf1248f940ccee99a66abaf500d8c0704240835dc76
    ports:
      - "4001:8080"
    volumes:
      - ./work:/app/work
    networks:
      - yonghemolimis-network
    depends_on:
      - mysql

secrets:
  github_token:
    environment: GITHUB_TOKEN

networks:
  yonghemolimis-network:
    driver: bridge

volumes:
  mysqldata:
